<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quaresma Litúrgica</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/acessibilidade.css"/>
    <link rel="stylesheet" href="/css/print.css" media="print"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#1a4f89"/>
    <link rel="icon" href="/imagens/favicon.svg" type="image/svg+xml"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="menu-placeholder"></div>

        <div class="card hero-card">
            <header style="text-align:center;">
                <h1>✝️ Quaresma Litúrgica</h1>
                <p class="lead">Caminho oficial da Igreja Católica em preparação para a Páscoa — 40 dias de jejum, oração e esmola.</p>
                <p class="muted" style="margin-top:6px;">
                    <em>"Convertei-vos a mim de todo o vosso coração, com jejum, choro e pranto."</em> (Joel 2,12)
                </p>
            </header>
        </div>

        <div id="mensagemDia" style="text-align:center;">
            <h3 id="qMensagem">📅 Carregando...</h3>
            <p id="qPeriodo" style="color:#555;margin-top:6px;"></p>
        </div>

        <div class="card" style="margin-top:20px;">
            <div class="top-controls">
                <input type="date" id="dataPicker" style="padding:8px;border-radius:8px;border:1px solid #ccc;"/>
                <span id="qStatus" style="font-weight:bold;"></span>
            </div>
        </div>

        <div id="accordionQuaresma"></div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        function carregarQuaresma(dataStr) {
            var url = '/api/quaresma/liturgica';
            if (dataStr) url += '?data=' + dataStr;

            $.getJSON(url, function (data) {
                $('#qMensagem').text('📅 ' + (data.mensagemDia || ''));
                if (data.periodoFormatado) $('#qPeriodo').text('Período deste ano: ' + data.periodoFormatado);

                if (data.diaSelecionadoRenderizar) {
                    $('#qStatus').text('📅 Dia da Quaresma: ' + data.mensagemDia).css('color', 'darkblue');

                    var sections = [];
                    if (data.temaDoDia) sections.push({title: '🌿 Tema do Dia', content: data.temaDoDia});
                    if (data.praticasQuaresmais) sections.push({title: '🙏 Práticas Quaresmais', content: data.praticasQuaresmais});
                    if (data.oracaoQuaresmal) sections.push({title: '✝️ Oração', content: data.oracaoQuaresmal});
                    if (data.leituraSugerida) sections.push({title: '📖 Leitura Sugerida', content: data.leituraSugerida});
                    buildAccordion(sections, '#accordionQuaresma');
                } else {
                    $('#qStatus').text('📅 A data selecionada está fora do período da Quaresma litúrgica deste ano.').css('color', '#b03030');
                    $('#accordionQuaresma').empty();
                }
            });
        }

        $(function () {
            carregarQuaresma(null);
            var hoje = new Date().toISOString().split('T')[0];
            $('#dataPicker').val(hoje);

            $('#dataPicker').on('change', function () {
                carregarQuaresma($(this).val());
            });
        });
    </script>
    <script src="/js/acessibilidade.js"></script>
    <script src="/js/sw-register.js"></script>
</body>
</html>
