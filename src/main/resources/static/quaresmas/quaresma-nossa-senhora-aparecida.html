<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quaresma de N. Sra. Aparecida</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/acessibilidade.css"/>
    <link rel="stylesheet" href="/css/print.css" media="print"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#1a4f89"/>
    <link rel="icon" href="/imagens/favicon.svg" type="image/svg+xml"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="menu-placeholder"></div>

        <div class="card">
            <header style="text-align:center;">
                <h1>🇧🇷 Quaresma de N. Sra. Aparecida</h1>
                <p class="lead">40 dias de devoção à Padroeira do Brasil — do dia 2 de setembro ao dia 12 de outubro.</p>
                <p class="muted" style="margin-top:6px;">
                    <em>"Nossa Senhora Aparecida, Rainha e Mãe do Brasil, rogai por nós!"</em>
                </p>
            </header>
        </div>

        <div id="mensagemDia" style="text-align:center;">
            <h3 id="qMensagem">📅 Carregando...</h3>
        </div>

        <div class="card" style="margin-top:20px;">
            <div class="top-controls">
                <input type="date" id="dataPicker" style="padding:8px;border-radius:8px;border:1px solid #ccc;"/>
                <span id="qStatus" style="font-weight:bold;"></span>
            </div>
        </div>

        <div id="accordionQuaresma"></div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        function carregarQuaresma(dataStr) {
            var url = '/api/quaresma/nossa-senhora-aparecida';
            if (dataStr) url += '?data=' + dataStr;

            $.getJSON(url, function (data) {
                $('#qMensagem').text('📅 ' + (data.mensagemDia || ''));

                if (data.diaSelecionadoRenderizar) {
                    $('#qStatus').text('📅 Dia da Quaresma: ' + data.mensagemDia).css('color', 'darkblue');

                    var sections = [];
                    if (data.oracaoPreparatoria)  sections.push({title: '🙏 Oração Preparatória', content: data.oracaoPreparatoria});
                    if (data.tercoAparecida)      sections.push({title: '📿 Terço de N. Sra. Aparecida', content: data.tercoAparecida});
                    if (data.ladainhaAparecida)   sections.push({title: '📜 Ladainha de N. Sra. Aparecida', content: data.ladainhaAparecida});
                    if (data.oracaoConsagracao)   sections.push({title: '🕊️ Consagração a N. Sra. Aparecida', content: data.oracaoConsagracao});
                    if (data.oracaoFinal)         sections.push({title: '✨ Oração Final', content: data.oracaoFinal});
                    buildAccordion(sections, '#accordionQuaresma');
                } else {
                    $('#qStatus').text('📅 A data selecionada está fora do período da Quaresma (02/09 - 12/10).').css('color', '#b03030');
                    $('#accordionQuaresma').empty();
                }
            });
        }

        $(function () {
            carregarQuaresma(null);
            var hoje = new Date().toISOString().split('T')[0];
            $('#dataPicker').val(hoje);

            $('#dataPicker').on('change', function () {
                carregarQuaresma($(this).val());
            });
        });
    </script>
    <script src="/js/acessibilidade.js"></script>
    <script src="/js/sw-register.js"></script>
<script src="/js/streaks.js"></script>
<script src="/js/partilha.js"></script>
</body>
</html>
