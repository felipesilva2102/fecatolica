<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quaresma de São Miguel Arcanjo</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/acessibilidade.css"/>
    <link rel="stylesheet" href="/css/print.css" media="print"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#1a4f89"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="menu-placeholder"></div>

        <div class="card">
            <header style="text-align:center;">
                <h1>Quaresma de São Miguel Arcanjo</h1>
                <p class="lead">Acompanhe seu progresso e medite nas orações do dia.</p>
            </header>
        </div>

        <div id="mensagemDia" style="text-align:center;">
            <h3 id="qMensagem">📅 Carregando...</h3>
        </div>

        <div class="card" style="margin-top:20px;">
            <div class="top-controls">
                <input type="date" id="dataPicker" style="padding:8px;border-radius:8px;border:1px solid #ccc;"/>
                <span id="qStatus" style="font-weight:bold;"></span>
            </div>
        </div>

        <div id="accordionQuaresma"></div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        function carregarQuaresma(dataStr) {
            var url = '/api/quaresma/sao-miguel';
            if (dataStr) url += '?data=' + dataStr;

            $.getJSON(url, function (data) {
                $('#qMensagem').text('📅 ' + (data.mensagemDia || ''));

                if (data.diaSelecionadoRenderizar) {
                    $('#qStatus').text('📅 Dia da Quaresma: ' + data.mensagemDia).css('color', 'darkblue');

                    var sections = [];
                    if (data.preparacaoDiaria) sections.push({title: 'Preparação Diária', content: data.preparacaoDiaria});
                    if (data.oracaoDiariaInicial) sections.push({title: '1. Oração Inicial', content: data.oracaoDiariaInicial});
                    if (data.exameConsciencia) sections.push({title: '2. Exame de Consciência', content: data.exameConsciencia});

                    var leituraContent = (data.leituraBiblica || '');
                    if (data.leituraDoDia) leituraContent += '\n\n' + data.leituraDoDia;
                    if (leituraContent) sections.push({title: '3. Leitura Bíblica', content: leituraContent});

                    if (data.ladainhaSaoMiguel) sections.push({title: '4. Ladainha de São Miguel', content: data.ladainhaSaoMiguel});
                    if (data.consagracaoSaoMiguel) sections.push({title: '5. Consagração', content: data.consagracaoSaoMiguel});
                    if (data.oracaoFinal) sections.push({title: '6. Oração Final', content: data.oracaoFinal});
                    if (data.oracaoAugustaRainha) sections.push({title: '7. Augusta Rainha', content: data.oracaoAugustaRainha});
                    if (data.oferendaFinal) sections.push({title: '8. Oferenda Final', content: data.oferendaFinal});
                    if (data.oracoesFinais) sections.push({title: '9. Orações Finais', content: data.oracoesFinais});
                    buildAccordion(sections, '#accordionQuaresma');
                } else {
                    $('#qStatus').text('📅 A data selecionada está fora do período da Quaresma (15/08 - 29/09).').css('color', '#b03030');
                    $('#accordionQuaresma').empty();
                }
            });
        }

        $(function () {
            carregarQuaresma(null);
            var hoje = new Date().toISOString().split('T')[0];
            $('#dataPicker').val(hoje);

            $('#dataPicker').on('change', function () {
                carregarQuaresma($(this).val());
            });
        });
    </script>
    <script src="/js/acessibilidade.js"></script>
    <script src="/js/sw-register.js"></script>
</body>
</html>
