<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quaresma de Natal</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/acessibilidade.css"/>
    <link rel="stylesheet" href="/css/print.css" media="print"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#1a4f89"/>
    <link rel="icon" href="/imagens/favicon.svg" type="image/svg+xml"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="menu-placeholder"></div>

        <div class="card hero-card">
            <header style="text-align:center;">
                <h1>🎄 Quaresma de Natal</h1>
                <p class="lead">40 dias de preparação para o Natal do Senhor — do dia 15 de novembro à Véspera de Natal (24 de dezembro).</p>
                <p class="muted" style="margin-top:6px;">
                    <em>"Preparai o caminho do Senhor, endireitai as Suas veredas." — Mc 1,3</em>
                </p>
            </header>
        </div>

        <div id="mensagemDia" style="text-align:center;">
            <h3 id="qMensagem">📅 Carregando...</h3>
        </div>

        <div class="card" style="margin-top:20px;">
            <div class="top-controls">
                <input type="date" id="dataPicker" style="padding:8px;border-radius:8px;border:1px solid #ccc;"/>
                <span id="qStatus" style="font-weight:bold;"></span>
            </div>
        </div>

        <div id="accordionQuaresma"></div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        function carregarQuaresma(dataStr) {
            var url = '/api/quaresma/natal';
            if (dataStr) url += '?data=' + dataStr;

            $.getJSON(url, function (data) {
                $('#qMensagem').text('📅 ' + (data.mensagemDia || ''));

                if (data.diaSelecionadoRenderizar) {
                    $('#qStatus').text('📅 Dia da Quaresma: ' + data.mensagemDia).css('color', 'darkblue');

                    var sections = [];
                    if (data.preparacaoDiaria) sections.push({title: '🙏 Preparação Diária', content: data.preparacaoDiaria});
                    if (data.oracaoAdvento) sections.push({title: '1. 🕯️ Oração do Advento', content: data.oracaoAdvento});

                    var leituraContent = data.leituraDoDia || '';
                    if (leituraContent) sections.push({title: '2. 📖 Leitura do Dia', content: leituraContent});

                    if (data.antifonaO) sections.push({title: '3. 🎵 Antífonas do Ó (17-23/12)', content: data.antifonaO});
                    if (data.oracaoPresepio) sections.push({title: '4. ⭐ Oração do Presépio', content: data.oracaoPresepio});
                    if (data.oracaoFinal) sections.push({title: '5. ✨ Oração Final', content: data.oracaoFinal});
                    if (data.jaculatoria) sections.push({title: '6. 💫 Jaculatória', content: data.jaculatoria});
                    if (data.oracoesFinais) sections.push({title: '7. 🙏 Orações Finais', content: data.oracoesFinais});
                    buildAccordion(sections, '#accordionQuaresma');
                } else {
                    $('#qStatus').text('📅 A data selecionada está fora do período da Quaresma de Natal (15/11 - 24/12).').css('color', '#b03030');
                    $('#accordionQuaresma').empty();
                }
            });
        }

        $(function () {
            carregarQuaresma(null);
            var hoje = new Date().toISOString().split('T')[0];
            $('#dataPicker').val(hoje);

            $('#dataPicker').on('change', function () {
                carregarQuaresma($(this).val());
            });
        });
    </script>
    <script src="/js/acessibilidade.js"></script>
    <script src="/js/sw-register.js"></script>
<script src="/js/streaks.js"></script>
<script src="/js/partilha.js"></script>
</body>
</html>
